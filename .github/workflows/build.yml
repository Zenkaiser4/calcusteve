name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.0.0" virtualenv buildozer

      # TRUCO MAESTRO: Creamos la carpeta interna de Buildozer antes de tiempo
      # e instalamos las build-tools correctas en el sistema, enlazando 'aidl' directamente.
      - name: Pre-install and link AIDL for Buildozer
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.1" "platforms;android-33"
          
          # Creamos la ruta exacta que Buildozer busca desesperadamente
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/build-tools/
          
          # Creamos un acceso directo de la carpeta de herramientas real hacia la carpeta de Buildozer
          ln -s ${ANDROID_HOME}/build-tools/33.0.1 /home/runner/.buildozer/android/platform/android-sdk/build-tools/33.0.1

      - name: Build APK
        env:
          APP_ALLOW_ROOT: "1"
          BUILDOZER_ALLOW_KIVY_DEVELOP_BRANCH: "1"
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/*/build/outputs/apk/debug/*.apk
